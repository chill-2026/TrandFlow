<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        @media (pointer: coarse) {
            #calendar-tooltip { display: none !important; }
        }

</head>

    <div id="modal-calc" class="fixed inset-0 bg-black/40 hidden items-end justify-center z-50 p-4 transition-all">

                <button onclick="pressCalc('9')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">9</button>
                <button onclick="pressCalc('*')" class="bg-gray-50 p-4 font-bold text-indigo-600 hover:bg-gray-100 text-sm">×</button>

                <button onclick="pressCalc('4')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">4</button>
                <button onclick="pressCalc('5')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">5</button>
                <button onclick="pressCalc('6')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">6</button>
                <button onclick="pressCalc('-')" class="bg-gray-50 p-4 font-bold text-indigo-600 hover:bg-gray-100 text-sm">-</button>

                <button onclick="pressCalc('1')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">1</button>
                <button onclick="pressCalc('2')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">2</button>
                <button onclick="pressCalc('3')" class="bg-white p-4 font-bold text-gray-700 hover:bg-gray-50 text-sm">3</button>
                <button onclick="pressCalc('+')" class="bg-gray-50 p-4 font-bold text-indigo-600 hover:bg-gray-100 text-sm">+</button>

            </div>
            <div class="p-3 bg-white border-t border-gray-100 flex gap-2">

    <div id="modal-category" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">

                <h3 class="font-bold text-gray-700 text-sm">カテゴリ設定の編集</h3>

            <div id="modal-category-list" class="max-h-40 overflow-y-auto custom-scrollbar divide-y divide-gray-100 border border-gray-200 rounded-xl px-2 bg-gray-50"></div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 space-y-2.5">

                <div class="flex gap-2">
                    <div id="edit-cat-color-preview" class="w-10 h-10 rounded-xl bg-slate-400 shadow-inner flex-shrink-0 border border-black/5"></div>
                    <input type="text" id="edit-cat-name" placeholder="カテゴリ名" class="w-full bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20">

                </div>

        </div>

    <script>
        // supabaseの初期化
        const supabaseUrl = 'https://wplrykemwhdqkpwjoxck.supabase.co';
        const supabaseKey = 'sb_publishable_KRCDws1Amn3BRq5khYiKCg__BSlcwsu';

        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        // カラーパレット(16色)の定数定義
        const PALETTE_COLORS = [
            '#ef4444', '#f97316', '#f59e0b', '#eab308', 
            '#22c55e', '#10b981', '#14b8a6', '#06b6d4',
            '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', 
            '#d946ef', '#ec4899', '#64748b', '#475569'
        ];

        // 初期デフォルトカテゴリ
        const DEFAULT_CATEGORIES = [
            { id: 'cat-1', name: '裁量', color: '#f97316' },
            { id: 'cat-2', name: 'EA1', color: '#06b6d4' },
            { id: 'cat-3', name: 'EA2', color: '#ec4899' },
            { id: 'cat-4', name: 'EA3', color: '#22c55e' },
            { id: 'cat-5', name: 'その他', color: '#64748b' }
        ];

        // アプリケーション状態管理
        let state = {
            currentView: 'calendar',
            currentDate: new Date(), 
            categories: [],
            records: [],
            editingRecordId: null,
            selectedFormCategoryId: null,
            selectedEditorColor: PALETTE_COLORS[0]
        };

        // 電卓ロジック用の状態
        let calcState = {
            isOpen: false,
            expression: '',
            currentInput: '0',
            isReset: true
        };

        // アプリケーション初期化
        window.addEventListener('DOMContentLoaded', async () => {
            await initDataFromSupabase();
            initColorPaletteUI();
            setupKeyboardListeners();
            switchView('calendar');
            lucide.createIcons();
        });

        // データアクセス
        async function initDataFromSupabase() {
            const {data: cats, error: catError} = await supabaseClient.from('categories').select('*');
            if (!catError && cats && cats.length > 0) {
                state.categories = cats;
            } else {
                state.categories = [...DEFAULT_CATEGORIES];
                await saveCategoriesToSupabase();
            }

            await loadRecordsFromSupabase();
        }

        async function saveCategoriesToSupabase() {
            try {
                const {error: delError} = await supabaseClient.from('categories').delete().neq('id', 'dummy');
                if (delError) throw delError;

                const {error: insError} = await supabaseClient.from('categories').upsert(state.categories);
                if (insError) throw insError;

                await loadCategoriesFromSupabase();
            } catch(e) {
                alert("カテゴリの保存に失敗しました。");
            }
        }

        async function loadCategoriesFromSupabase() {
            const {data: cats, error: catError} = await supabaseClient.from('categories').select('*');
            if (!catError && cats && cats.length > 0) {
                state.categories = cats;
            } else {
                alert("カテゴリの読込に失敗しました。");
            }
        }

        async function saveRecordsToSupabase() {
           try {
                const {error: delError} = await supabaseClient.from('records').delete().neq('id', 'dummy');
                if (delError) throw delError;

                const {error: insError} = await supabaseClient.from('records').upsert(state.records);
                if (insError) throw insError;

                await loadRecordsFromSupabase();
            } catch(e) {
                alert("取引データの保存に失敗しました。" + e.message);
            }           
        }

        async function loadRecordsFromSupabase() {
            const {data: recs, error: recError} = await supabaseClient.from('records').select('*');
            if (!recError) {
                state.records = recs || [];
            } else {
                alert("取引データの読込に失敗しました。");
            }
        }

        function exportDataToJson() {
            const data = {
                exportedAt: new Date().toISOString(),
                categories: state.categories,
                records: state.records
            };

            const jsonString = JSON.stringify(data, null, 2);

            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `trade_flow_backup_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();

            URL.revokeObjectURL(url);
        }

        function importDataFromJson(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("現在のデータはすべて上書きされます。よろしいですか？")) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);

                    if (imported.categories && imported.records) {
                        state.categories = imported.categories;
                        state.records = imported.records;

                        await saveCategoriesToSupabase();
                        await saveRecordsToSupabase();
                        
                        alert("データの復元が完了しました。ページをリロードします。");
                        location.reload();
                    } else {
                        alert("無効なファイル形式です。正しいバックアップファイルを選択してください。");
                    }
                } catch (e) {
                    alert("データの読み込みに失敗しました。ファイルが壊れている可能性があります。");
                }
            };
            reader.readAsText(file);
        }

        async function resetAllData() {
            if (!confirm("全ての取引データおよびカテゴリ設定が完全に削除されます。本当によろしいですか？")) {
                return;
            }

            try {
                state.categories = [...DEFAULT_CATEGORIES];
                await saveCategoriesToSupabase();

                state.records = [];
                await saveRecordsToSupabase();
            } catch (e) {
                alert("データの初期化に失敗しました。");
                return;
            }

            alert("データを全てリセットしました。初期状態に戻ります。");

            location.reload();
        }

        // 汎用関数
        function formatDisplayAmount(num) {
            const str = Math.abs(num).toLocaleString('ja-JP');
            return num < 0 ? `¥-${str}` : `¥${str}`;
        }

        function getAmountColorClass(num) {
            return num >= 0 ? 'text-blue-600' : 'text-red-500';
        }

        // 月切り替え
        function changeMonth(dir) {
            state.currentDate.setMonth(state.currentDate.getMonth() + dir);

            viewName = state.currentView;

            if (viewName === 'calendar') {
                renderCalendarView();
            } else if (viewName === 'report') {
                renderReportGraphView();
            }
        }

        function resetToCurrentMonth() {
            state.currentDate = new Date();

            viewName = state.currentView;

            if (viewName === 'calendar') {
                renderCalendarView();
            } else if (viewName === 'report') {
                renderReportGraphView();
            }
        }

        // スワイプによる月切り替え
        function enableSwipe(element, onLeft, onRight) {
            let startX, startY;

            element.addEventListener('touchstart', (e) => {
                startX = e.touches[0].screenX;
                startY = e.touches[0].screenY;
            }, { passive: true });

            element.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const endY = e.changedTouches[0].screenY;

                const diffX = startX - endX;
                const diffY = startY - endY;

                // 横移動が縦移動より大きく、かつ一定距離以上動いた場合
                if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 0) {
                        onLeft();
                    } else {
                        onRight();
                    }
                }
            }, { passive: true });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // カレンダー画面のスワイプ設定
            const calArea = document.getElementById('calendar-swipe-area');
            if (calArea) {
                enableSwipe(calArea, () => changeMonth(1), () => changeMonth(-1));
            }

            // レポート画面のスワイプ設定
            const repArea = document.getElementById('view-report'); 
            if (repArea) {
                enableSwipe(repArea, () => changeMonth(1), () => changeMonth(-1));
            }
        });

        // 画面表示
        function switchView(viewName) {
            state.currentView = viewName;

            document.getElementById('view-calendar').classList.toggle('hidden', viewName !== 'calendar');
            document.getElementById('view-input').classList.toggle('hidden', viewName !== 'input');
            document.getElementById('view-report').classList.toggle('hidden', viewName !== 'report');
            document.getElementById('view-settings').classList.toggle('hidden', viewName !== 'settings');

            ['calendar', 'input', 'report', 'settings'].forEach(v => {
                const navBtn = document.getElementById(`nav-${v}`);
                if (v === viewName) {
                    navBtn.classList.remove('text-gray-400', 'font-medium', 'hover:text-gray-600');
                    navBtn.classList.add('text-indigo-600', 'font-bold');
                } else {
                    navBtn.classList.remove('text-indigo-600', 'font-bold');
                    navBtn.classList.add('text-gray-400', 'font-medium', 'hover:text-gray-600');
                }
            });

            if (viewName === 'calendar') {
                renderCalendarView();
            } else if (viewName === 'input') {
                renderInputView();
            } else if (viewName === 'report') {
                renderReportGraphView();
            } else if (viewName === 'settings') {
            }
        }

        // カレンダー画面
        function renderCalendarView() {
            const targetYear = state.currentDate.getFullYear();
            const targetMonth = state.currentDate.getMonth();

            document.getElementById('calendar-month-title').textContent = `${targetYear}年 ${targetMonth + 1}月`;

            const firstDayIndex = new Date(targetYear, targetMonth, 1).getDay();
            const totalDaysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
            const totalDaysInPrevMonth = new Date(targetYear, targetMonth, 0).getDate();

            const gridContainer = document.getElementById('calendar-grid');
            gridContainer.innerHTML = '';

            const recordsInMonth = state.records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === targetYear && d.getMonth() === targetMonth;
            });

            const dailyBalances = {};
            recordsInMonth.forEach(r => {
                const dayNum = new Date(r.date).getDate();
                dailyBalances[dayNum] = (dailyBalances[dayNum] || 0) + r.amount;
            });

            let totalIncome = 0;
            let totalExpense = 0;
            recordsInMonth.forEach(r => {
                if (r.amount >= 0) totalIncome += r.amount;
                else totalExpense += r.amount;
            });
            const netGrandTotal = totalIncome + totalExpense;

            document.getElementById('calendar-income').textContent = formatDisplayAmount(totalIncome);
            document.getElementById('calendar-expense').textContent = formatDisplayAmount(totalExpense);

            const totalContainer = document.getElementById('calendar-total');
            totalContainer.textContent = formatDisplayAmount(netGrandTotal);
            totalContainer.className = `font-bold text-sm mt-0.5 ${getAmountColorClass(netGrandTotal)}`;

            const systemToday = new Date();

            for (let i = firstDayIndex - 1; i >= 0; i--) {
                const d = totalDaysInPrevMonth - i;
                const cell = document.createElement('div');
                cell.className = "bg-gray-50 border border-gray-100 min-h-[38px] p-1 text-[10px] text-gray-300 opacity-60 rounded-lg";
                cell.textContent = d;
                gridContainer.appendChild(cell);
            }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const currentIterationDate = new Date(targetYear, targetMonth, day);
                const weekdayIndex = currentIterationDate.getDay();

                const cell = document.createElement('div');
                
                let dayColorClass = "text-gray-700";
                if (weekdayIndex === 0) dayColorClass = "text-red-500";
                if (weekdayIndex === 6) dayColorClass = "text-blue-500";

                let borderStyleClass = "border border-gray-100";
                const isTodayMatch = systemToday.getFullYear() === targetYear && 
                                     systemToday.getMonth() === targetMonth && 
                                     systemToday.getDate() === day;
                if (isTodayMatch) {
                    borderStyleClass = "border-2 border-indigo-600 ring-2 ring-indigo-600/10";
                }

                cell.className = `bg-white ${borderStyleClass} min-h-[38px] p-1 rounded-xl flex flex-col justify-between cursor-pointer hover:bg-indigo-50/50 transition relative`;
                
                const dayHeader = document.createElement('div');
                dayHeader.className = `text-[10px] font-bold ${dayColorClass}`;
                dayHeader.textContent = day;
                cell.appendChild(dayHeader);

                const hasRecords = dailyBalances.hasOwnProperty(day);

                if (hasRecords) {
                    const balanceVal = dailyBalances[day] || 0;
                    const amtLabel = document.createElement('div');
                    amtLabel.className = `text-[8px] font-extrabold tracking-tighter truncate text-center w-full ${getAmountColorClass(balanceVal)}`;
                    amtLabel.textContent = formatDisplayAmount(balanceVal);
                    cell.appendChild(amtLabel);

                    if (window.matchMedia('(pointer: fine)').matches) {
                        cell.addEventListener('mousemove', (e) => showCalendarTooltip(e, balanceVal));
                        cell.addEventListener('mouseleave', hideCalendarTooltip);
                    }
                } else {
                    const spacer = document.createElement('div');
                    cell.appendChild(spacer);
                }

                cell.onclick = () => {
                    const mStr = String(targetMonth + 1).padStart(2, '0');
                    const dStr = String(day).padStart(2, '0');
                    prepareNewInputView(`${targetYear}-${mStr}-${dStr}`);
                };

                gridContainer.appendChild(cell);
            }

            renderHistoryListSection(recordsInMonth);
        }

        // カレンダーのツールチップ
        function showCalendarTooltip(e, amount) {
            const tooltip = document.getElementById('calendar-tooltip');
            tooltip.textContent = formatDisplayAmount(amount);
            
            const bgClass = amount >= 0 ? 'bg-blue-600' : 'bg-red-500';
            tooltip.className = `fixed ${bgClass} text-white font-bold text-base px-3 py-1.5 rounded-xl shadow-xl pointer-events-none z-50 transition-opacity duration-150`;
            
            tooltip.style.left = `${e.clientX + 10}px`;
            tooltip.style.top = `${e.clientY - 40}px`;
            tooltip.classList.remove('hidden');
        }

        function hideCalendarTooltip() {
            document.getElementById('calendar-tooltip').classList.add('hidden');
        }

        // レコード履歴
        function renderHistoryListSection(records) {
            const listContainer = document.getElementById('history-container');
            listContainer.innerHTML = '';

            if (records.length === 0) {
                listContainer.innerHTML = '<div class="p-8 text-center text-xs text-gray-400">取引履歴はありません</div>';
                return;
            }

            const groups = {};
            records.forEach(rec => {
                if (!groups[rec.date]) groups[rec.date] = [];
                groups[rec.date].push(rec);
            });

            const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

            sortedDates.forEach(dateStr => {
                const items = groups[dateStr];

                items.sort((a, b) => {
                    const indexA = state.categories.findIndex(c => c.id === a.categoryId);
                    const indexB = state.categories.findIndex(c => c.id === b.categoryId);
                    return indexA - indexB;
                });

                const dayTotal = items.reduce((sum, item) => sum + item.amount, 0);
                const d = new Date(dateStr);
                const header = document.createElement('div');
                header.className = "bg-gray-100 px-3 py-2 flex items-center justify-between text-xs font-bold text-gray-600 sticky top-0 z-10";
                header.innerHTML = `<span>${d.getMonth()+1}月${d.getDate()}日</span><span>${formatDisplayAmount(dayTotal)}</span>`;
                listContainer.appendChild(header);

                items.forEach(item => {
                    const cat = state.categories.find(c => c.id === item.categoryId) || { name: 'その他', color: '#64748b' };
                    const div = document.createElement('div');
                    div.className = "p-3 flex items-center justify-between hover:bg-slate-50 cursor-pointer";
                    div.onclick = () => prepareEditInputView(item.id);
                    div.innerHTML = `
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${cat.color}"></div>
                            <span class="text-xs font-bold">${cat.name}</span>
                        </div>
                        <span class="text-xs font-bold ${getAmountColorClass(item.amount)}">${formatDisplayAmount(item.amount)}</span>
                    `;
                    listContainer.appendChild(div);
                });
            });
        }

        // 入力画面

            state.categories.forEach(cat => {

        // 新規入力（入力画面前処理）
        function prepareNewInputView(targetDateStr = null) {
            state.editingRecordId = null;
            document.getElementById('input-view-title').textContent = "取引の入力";
            document.getElementById('btn-delete-record').classList.add('hidden');
            
            let yyyy, mm, dd;

                yyyy = parts[0];
                mm = parts[1];
                dd = parts[2];

                yyyy = today.getFullYear();
                mm = String(today.getMonth() + 1).padStart(2, '0');

        // 電卓
        function openCalculator() {
            const currentAmountValue = document.getElementById('form-amount').value;
            calcState.expression = '';
            calcState.currentInput = currentAmountValue === '0' ? '0' : currentAmountValue;
            calcState.isReset = true;
            calcState.isOpen = true;
            
            updateCalcScreen();
            const modal = document.getElementById('modal-calc');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeCalculator(applyValue = false) {
            if (applyValue) {
                try {
                    let evalExpr = calcState.expression + calcState.currentInput;
                    if (evalExpr) {
                        let sanitized = evalExpr.replace(/[^0-9.+\-*/()]/g, '');
                        if(sanitized) {
                            let result = new Function(`return (${sanitized})`)();
                            if (isFinite(result)) {
                                document.getElementById('form-amount').value = Math.round(result).toString();
                            }
                        }
                    } else {
                        document.getElementById('form-amount').value = Math.round(Number(calcState.currentInput) || 0).toString();
                    }
                } catch(e) {
                    alert("数式エラーが発生しました");
                    return;
                }
            }
            calcState.isOpen = false;
            const modal = document.getElementById('modal-calc');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function updateCalcScreen() {
            document.getElementById('calc-expr').textContent = calcState.expression;
            document.getElementById('calc-screen').textContent = calcState.currentInput;
        }

        // 電卓のボタンが押された
        function pressCalc(key) {
            if ((key >= '0' && key <= '9') || key === '.') {
                if (calcState.isReset || calcState.currentInput === '0') {
                    calcState.currentInput = key === '.' ? '0.' : key;
                    calcState.isReset = false;
                } else {
                    if (key === '.' && calcState.currentInput.includes('.')) return;
                    calcState.currentInput += key;
                }
            } else if (['+', '-', '*', '/'].includes(key)) {
                calcState.expression += calcState.currentInput + ' ' + key + ' ';
                calcState.currentInput = '0';
                calcState.isReset = true;
            } else if (key === '=') {
                if (!calcState.expression) return;
                try {
                    let fullExpr = calcState.expression + calcState.currentInput;
                    let sanitized = fullExpr.replace(/[^0-9.+\-*/()]/g, '');
                    let res = new Function(`return (${sanitized})`)();
                    calcState.currentInput = String(Math.round(res));
                    calcState.expression = '';
                    calcState.isReset = true;
                } catch(e) {
                    calcState.currentInput = 'Error';
                }
            } else if (key === 'C') {
                calcState.expression = '';
                calcState.currentInput = '0';
                calcState.isReset = true;
            } else if (key === 'DEL') {
                if (calcState.currentInput.length > 1) {
                    calcState.currentInput = calcState.currentInput.slice(0, -1);
                } else {
                    calcState.currentInput = '0';
                    calcState.isReset = true;
                }
            } else if (key === '±') {
                if (calcState.currentInput !== '0' && calcState.currentInput !== 'Error') {
                    if (calcState.currentInput.startsWith('-')) {
                        calcState.currentInput = calcState.currentInput.slice(1);
                    } else {
                        calcState.currentInput = '-' + calcState.currentInput;
                    }
                }
            }
            updateCalcScreen();
        }

        // キーボードが押された時
        function setupKeyboardListeners() {
            window.addEventListener('keydown', (e) => {
                if (!calcState.isOpen) return;

                const key = e.key;
                if (key >= '0' && key <= '9' || key === '.') {
                    e.preventDefault();
                    pressCalc(key);
                } else if (['+', '-', '*', '/'].includes(key)) {
                    e.preventDefault();
                    pressCalc(key);
                } else if (key === 'Enter') {
                    e.preventDefault();
                    if (calcState.expression) {
                        pressCalc('=');
                    } else {
                        closeCalculator(true);
                    }
                } else if (key === 'Escape') {
                    e.preventDefault();
                    closeCalculator(false);
                } else if (key === 'Backspace') {
                    e.preventDefault();
                    pressCalc('DEL');
                } else if (key === 'Delete' || key === 'c' || key === 'C') {
                    e.preventDefault();
                    pressCalc('C');
                }
            });
        }

        // レコード保存
        async function saveRecord() {
            const dateVal = document.getElementById('form-date').value;
            const amtVal = Number(document.getElementById('form-amount').value) || 0;
            const memoVal = document.getElementById('form-memo').value.trim();

            if (!dateVal) {
                alert("日付を入力してください");
                return;
            }
            if (!state.selectedFormCategoryId) {
                alert("カテゴリを選択してください");
                return;
            }

            if (state.editingRecordId) {
                const idx = state.records.findIndex(r => r.id === state.editingRecordId);
                if (idx !== -1) {
                    state.records[idx].date = dateVal;
                    state.records[idx].categoryId = state.selectedFormCategoryId;
                    state.records[idx].amount = amtVal;
                    state.records[idx].memo = memoVal;
                }
            } else {
                const newRec = {
                    id: 'rec-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
                    date: dateVal,
                    categoryId: state.selectedFormCategoryId,
                    amount: amtVal,
                    memo: memoVal
                };
                state.records.push(newRec);
            }

            try {
                await saveRecordsToSupabase();
            } catch(e) {
            }
            state.currentDate = new Date(dateVal);
            switchView('calendar');
        }

        // レコード削除
        async function deleteRecord() {
            if (!state.editingRecordId) return;
            if (!confirm("この履歴を削除しますか？")) return;

            state.records = state.records.filter(r => r.id !== state.editingRecordId);
            try {
                await saveRecordsToSupabase();
            } catch(e) {
            }
            switchView('calendar');
        }

        // レポート画面
        function renderReportGraphView() {
            const d = state.currentDate;
            const yearMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;

            document.getElementById('report-month-title').textContent = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;

            // 月でフィルタリング
            const currentMonthData = state.records.filter(r => r.date.startsWith(yearMonth));

            let totalIncome = 0;
            let totalExpense = 0;
            currentMonthData.forEach(r => {
                if (r.amount >= 0) totalIncome += r.amount;
                else totalExpense += r.amount;
            });
            const netGrandTotal = totalIncome + totalExpense;

            document.getElementById('report-income').textContent = formatDisplayAmount(totalIncome);
            document.getElementById('report-expense').textContent = formatDisplayAmount(totalExpense);

            const totalContainer = document.getElementById('report-total');
            totalContainer.textContent = formatDisplayAmount(netGrandTotal);
            totalContainer.className = `font-bold text-sm mt-0.5 ${getAmountColorClass(netGrandTotal)}`;

            // 利益と損失に分ける
            const incomeRecords = currentMonthData.filter(r => r.amount >= 0);
            const expenseRecords = currentMonthData.filter(r => r.amount < 0);

            // カテゴリ集計
            const aggregate = (data) => {
                const grouped = data.reduce((acc, curr) => {
                    const cat = state.categories.find(c => c.id === curr.categoryId) || {id: 'unknown', name: '未分類', color: '#9ca3af'};

                    if (!acc[cat.id]) {
                        acc[cat.id] = {id: cat.id, name: cat.name, value: 0, color: cat.color};
                    }

                    acc[cat.id].value += Math.abs(curr.amount);

                    return acc;
                }, {});

                // カテゴリ登録順に並び替え
                return state.categories.map(cat => grouped[cat.id]).filter(Boolean);
            };

            const incomeGraphData = aggregate(incomeRecords);
            const expenseGraphData = aggregate(expenseRecords);

            // 描画関数を呼び出す
            drawPieChart(incomeGraphData, 'report-svg-income');
            renderLegend(incomeGraphData, 'report-legend-income');
            drawPieChart(expenseGraphData, 'report-svg-expense');
            renderLegend(expenseGraphData, 'report-legend-expense');
        }

        // 円グラフ
        function drawPieChart(chartData, svgId) {
            const svg = document.getElementById(svgId);
            svg.innerHTML = '';

            const total = chartData.reduce((sum, item) => sum + item.value, 0);

            if (total === 0) {
                svg.innerHTML = '<text x="50" y="50" text-anchor="middle" font-size="8" fill="#9ca3af">データがありません。</text>';
                return;
            }

            const centerX = 50;
            const centerY = 50;

            const radius = 40;

            let startAngle = -Math.PI / 2;

            chartData.forEach(slice => {
                const sliceAngle = (slice.value / total) * Math.PI * 2;
                const endAngle = startAngle + sliceAngle;
                const percentageValue = (slice.value / total) * 100;

                if (Math.abs(sliceAngle - Math.PI * 2) < 0.0001) {

                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", centerX);
                    circle.setAttribute("cy", centerY);
                    circle.setAttribute("r", radius);
                    circle.setAttribute("fill", slice.color);
                    svg.appendChild(circle);

                } else if (sliceAngle !== 0) {

                    const x1 = centerX + radius * Math.cos(startAngle);
                    const y1 = centerY + radius * Math.sin(startAngle);
                    const x2 = centerX + radius * Math.cos(endAngle);
                    const y2 = centerY + radius * Math.sin(endAngle);
                    const largeArcFlag = sliceAngle > Math.PI ? 1 : 0;
                    const pathData = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", pathData);
                    path.setAttribute("fill", slice.color);
                    svg.appendChild(path);
                }

                startAngle = endAngle;
            });
        }

        // 凡例
        function renderLegend(chartData, legendId) {
            const legend = document.getElementById(legendId);
            legend.innerHTML = '';

            const total = chartData.reduce((sum, item) => sum + item.value, 0);

            if (total === 0) {
                return;
            }

            chartData.forEach(slice => {
                const percentageValue = (slice.value / total) * 100;

                const row = document.createElement('div');
                row.className = "flex items-center justify-between text-xs border-b border-gray-100 pb-1.5 last:border-0";

                const left = document.createElement('div');
                left.className = "flex items-center gap-2 min-w-0";

                const dot = document.createElement('div');
                dot.className = "w-2.5 h-2.5 rounded-full flex-shrink-0 border border-black/5";
                dot.style.backgroundColor = slice.color;

                const nameLbl = document.createElement('span');
                nameLbl.className = "font-medium truncate text-gray-600";
                nameLbl.textContent = `${slice.name} (${Math.round(percentageValue)}%)`;

                left.appendChild(dot);
                left.appendChild(nameLbl);

                const rightVal = document.createElement('span');
                rightVal.className = "font-bold text-gray-700 font-mono pl-2 flex-shrink-0";
                rightVal.textContent = formatDisplayAmount(slice.value);

                row.appendChild(left);
                row.appendChild(rightVal);
                legend.appendChild(row);
            });
        }
    </script>
</body>
